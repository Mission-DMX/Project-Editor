name: Build editor and publish as package

on:
  push:
    tags:
      - "v*"

jobs:
  build_package:
    runs-on: [ self-hosted ]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: make
        run: |
          pdm install --dev -G build 
          pdm run make package

      - name: publish
        run: cd bin && rm -rf !(*.deb) && sudo /home/deploy/deploy.bash "*" downloads/packages