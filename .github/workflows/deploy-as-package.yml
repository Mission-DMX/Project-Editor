name: Build editor and publish as package

on:
  push:
    tags:
      - "v*"

jobs:
  build_package:
    runs-on: [ self-hosted ]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: make
        run: |
          pdm install --dev -G build 
          pdm run make package

      - name: publish
        run: |
          cd bin
          find . -maxdepth 1 ! -name '*.deb' ! -name '.' -exec rm -rf {} +
          sudo /home/deploy/deploy.bash "*" downloads/packages

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            downloads/packages/*.deb